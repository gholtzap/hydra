appId: com.gmh.hydra
productName: Hydra

protocols:
  - name: Hydra Auth
    schemes:
      - com.gmh.hydra

directories:
  output: release

files:
  - dist-electron/**/*

asarUnpack:
  - node_modules/@tokscale/cli-*/bin/*
  - node_modules/node-pty/**/*

extraResources:
  - from: dist-electron/main/pty_host.py
    to: helpers/pty_host.py
  - from: dist-electron/main/app-launch-runner.sh
    to: helpers/app-launch-runner.sh
  - from: dist-electron/main/app-launch-runner.ps1
    to: helpers/app-launch-runner.ps1

mac:
  category: public.app-category.developer-tools
  icon: build/hydra.icns
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64

win:
  icon: build/hydra.ico 
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/hydra.ico
  uninstallerIcon: build/hydra.ico

publish:
  provider: github
  releaseType: release
