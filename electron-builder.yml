appId: com.gmh.hydra
productName: Hydra

directories:
  output: release

files:
  - dist-electron/**/*

asarUnpack:
  - node_modules/@tokscale/cli-*/bin/*

extraResources:
  - from: dist-electron/main/pty_host.py
    to: helpers/pty_host.py
  - from: dist-electron/main/app-launch-runner.sh
    to: helpers/app-launch-runner.sh

mac:
  category: public.app-category.developer-tools
  icon: build/hydra.icns
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: dmg
    - target: zip

publish:
  provider: github
  releaseType: release
