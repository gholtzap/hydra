name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate macOS signing configuration
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -z "${CSC_LINK:-}" ] || [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            echo "::error::Hydra macOS releases must be code signed for auto-update to work. Configure CSC_LINK and CSC_KEY_PASSWORD before pushing a release tag."
            exit 1
          fi

      - name: Build macOS release artifacts
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:mac -- --publish never

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          dmg_path="release/Hydra-${TAG_NAME#v}-arm64.dmg"
          zip_path="release/Hydra-${TAG_NAME#v}-arm64.zip"

          assets=(
            "$dmg_path#Hydra macOS installer (Apple Silicon)"
            "$zip_path#Hydra macOS app archive (Apple Silicon)"
          )
          for yml_file in release/latest-mac.yml release/latest-mac-arm64.yml; do
            [ -f "$yml_file" ] && assets+=("$yml_file")
          done

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" \
              --verify-tag \
              --generate-notes \
              --latest
          fi
