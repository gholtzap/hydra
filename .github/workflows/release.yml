name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS release artifacts
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "${CSC_LINK:-}" ]; then
            npm run dist:mac -- --publish never
          else
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npm run dist:mac -- --publish never
          fi

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          dmg_path="release/Hydra-${TAG_NAME#v}-arm64.dmg"
          zip_path="release/Hydra-${TAG_NAME#v}-arm64.zip"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              "$dmg_path#Hydra macOS installer (Apple Silicon)" \
              "$zip_path#Hydra macOS app archive (Apple Silicon)" \
              --clobber
          else
            gh release create "$TAG_NAME" \
              "$dmg_path#Hydra macOS installer (Apple Silicon)" \
              "$zip_path#Hydra macOS app archive (Apple Silicon)" \
              --verify-tag \
              --generate-notes \
              --latest
          fi
