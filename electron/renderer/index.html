<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Hydra</title>
    <script>
      try {
        const raw = localStorage.getItem("claude-workspace-theme-bootstrap-v1");
        const cached = raw ? JSON.parse(raw) : null;
        const appearance = cached && typeof cached.appearance === "string" ? cached.appearance : "system";
        const prefersDark =
          appearance === "dark" ||
          (appearance === "system" &&
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        const vars =
          cached && typeof cached === "object"
            ? prefersDark
              ? cached.darkVars
              : cached.lightVars
            : null;

        if (prefersDark) {
          document.documentElement.classList.add("dark");
        }

        if (vars && typeof vars === "object") {
          for (const [name, value] of Object.entries(vars)) {
            if (typeof name === "string" && typeof value === "string") {
              document.documentElement.style.setProperty(name, value);
            }
          }
        }
      } catch {}
    </script>
    <link rel="stylesheet" href="./vendor/xterm.css" />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div id="app-shell">
      <aside id="sidebar"></aside>
      <main id="detail"></main>
    </div>

    <dialog id="settings-dialog" class="app-dialog app-dialog-wide"></dialog>
    <dialog id="quick-switcher-dialog" class="app-dialog"></dialog>
    <dialog id="session-search-dialog" class="app-dialog app-dialog-session-search"></dialog>
    <dialog id="command-palette-dialog" class="app-dialog"></dialog>
    <dialog id="app-launch-dialog" class="app-dialog"></dialog>
    <dialog id="plan-review-dialog" class="app-dialog app-dialog-plan-review"></dialog>
    <dialog id="tokscale-dialog" class="app-dialog app-dialog-terminal-overlay">
      <div id="tokscale-terminal-host"></div>
    </dialog>
    <dialog id="lazygit-dialog" class="app-dialog app-dialog-lazygit">
      <div id="lazygit-terminal-host"></div>
    </dialog>

    <script src="./vendor/xterm.js"></script>
    <script src="./vendor/addon-fit.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
